<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CiteWise — Multi-Agent Research Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse-ring { 0%{transform:scale(.9);opacity:.7} 50%{transform:scale(1);opacity:1} 100%{transform:scale(.9);opacity:.7} }
    .step-active { animation: pulse-ring 1.2s ease-in-out infinite; }
    .fade-in { animation: fade .35s ease-out; }
    @keyframes fade { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  </style>
</head>
<body class="h-full bg-slate-50 text-slate-800">
  <div class="max-w-3xl mx-auto px-4 py-8">

    <!-- Header -->
    <header class="mb-8">
      <div class="flex items-center justify-between gap-4">
        <div>
          <h1 class="text-3xl font-bold tracking-tight text-slate-900">
            Cite<span class="text-indigo-600">Wise</span>
          </h1>
          <p class="text-slate-500 mt-1">Multi-agent research assistant with adversarial fact-checking.</p>
        </div>
        <span id="modelBadge" class="hidden sm:inline-flex items-center gap-2 rounded-full bg-white border border-slate-200 px-3 py-1.5 text-xs font-medium text-slate-600 shadow-sm">
          <span class="h-2 w-2 rounded-full bg-emerald-500"></span><span id="modelText">…</span>
        </span>
      </div>
    </header>

    <!-- Question form -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
      <label for="question" class="block text-sm font-medium text-slate-700 mb-2">Research question</label>
      <textarea id="question" rows="2"
        class="w-full resize-none rounded-xl border border-slate-300 px-4 py-3 text-slate-800 placeholder-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none"
        placeholder="e.g. How has the cost of solar power changed, and why does it matter?"></textarea>
      <div class="mt-3 flex items-center justify-between">
        <p class="text-xs text-slate-400">Planner → Researcher → Fact-Checker → Synthesizer, with your approval before export.</p>
        <button id="researchBtn"
          class="inline-flex items-center gap-2 rounded-xl bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition">
          <span id="btnText">Research</span>
        </button>
      </div>
    </section>

    <!-- Progress -->
    <section id="progress" class="hidden mt-6 bg-white rounded-2xl shadow-sm border border-slate-200 p-5 fade-in">
      <div id="steps" class="flex flex-wrap gap-2"></div>
    </section>

    <!-- Results -->
    <section id="results" class="mt-6 space-y-6"></section>

    <footer class="mt-12 text-center text-xs text-slate-400">
      CiteWise · LangGraph multi-agent capstone
    </footer>
  </div>

  <script>
    const PIPELINE = [
      { key: "guardrail",    label: "Validate" },
      { key: "planner",      label: "Plan" },
      { key: "researcher",   label: "Research" },
      { key: "fact_checker", label: "Fact-check" },
      { key: "synthesizer",  label: "Write" },
    ];
    const STATUS_STYLE = {
      supported:           { c: "bg-emerald-50 text-emerald-700 border-emerald-200", dot: "bg-emerald-500", t: "supported" },
      unsupported:         { c: "bg-rose-50 text-rose-700 border-rose-200",          dot: "bg-rose-500",    t: "unsupported" },
      needs_more_evidence: { c: "bg-amber-50 text-amber-700 border-amber-200",       dot: "bg-amber-500",   t: "needs more" },
    };

    const $ = (id) => document.getElementById(id);
    let threadId = null, es = null;

    // Provider/model badge
    fetch("/api/config").then(r => r.json()).then(d => {
      $("modelText").textContent = `${d.provider} · ${d.model}`;
      $("modelBadge").classList.remove("hidden");
    }).catch(() => {});

    function renderSteps(activeKey, allDone = false) {
      $("steps").innerHTML = PIPELINE.map((p, i) => {
        const activeIdx = PIPELINE.findIndex(x => x.key === activeKey);
        let cls = "bg-slate-100 text-slate-400 border-slate-200", icon = "○";
        if (allDone || (activeIdx > -1 && i < activeIdx)) { cls = "bg-emerald-50 text-emerald-700 border-emerald-200"; icon = "✓"; }
        else if (activeIdx > -1 && i === activeIdx) { cls = "bg-indigo-50 text-indigo-700 border-indigo-300 step-active"; icon = "●"; }
        return `<span class="inline-flex items-center gap-1.5 rounded-lg border px-3 py-1.5 text-xs font-medium ${cls}">
                  <span>${icon}</span>${p.label}</span>`;
      }).join("");
    }

    function setBusy(busy) {
      $("researchBtn").disabled = busy;
      $("btnText").textContent = busy ? "Researching…" : "Research";
    }

    function card(inner, extra = "") {
      const el = document.createElement("div");
      el.className = `bg-white rounded-2xl shadow-sm border border-slate-200 p-5 fade-in ${extra}`;
      el.innerHTML = inner;
      $("results").appendChild(el);
      return el;
    }

    function escapeHtml(s) {
      return (s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
    }

    function renderReport(report) {
      if (!report) return "";
      const sections = (report.sections || []).map(s =>
        `<div class="mt-4"><h4 class="font-semibold text-slate-800">${escapeHtml(s.heading)}</h4>
         <p class="mt-1 text-slate-600 whitespace-pre-line">${escapeHtml(s.content)}</p></div>`).join("");
      const cites = (report.citations || []).map(u =>
        `<li><a href="${escapeHtml(u)}" target="_blank" rel="noopener"
           class="text-indigo-600 hover:underline break-all">${escapeHtml(u)}</a></li>`).join("");
      return `
        <h3 class="text-lg font-bold text-slate-900">Report</h3>
        <p class="mt-2 text-slate-700 whitespace-pre-line">${escapeHtml(report.summary)}</p>
        ${sections}
        ${cites ? `<div class="mt-5 pt-4 border-t border-slate-100">
          <h4 class="font-semibold text-slate-800 mb-2">Citations</h4>
          <ul class="space-y-1 text-sm list-disc list-inside">${cites}</ul></div>` : ""}`;
    }

    function renderVerdicts(verdicts) {
      if (!verdicts || !verdicts.length) return "";
      const rows = verdicts.map(v => {
        const st = STATUS_STYLE[v.status] || STATUS_STYLE.needs_more_evidence;
        return `<div class="py-3 border-b border-slate-100 last:border-0">
          <div class="flex items-start gap-3">
            <span class="mt-0.5 inline-flex items-center gap-1.5 rounded-md border px-2 py-0.5 text-[11px] font-medium ${st.c}">
              <span class="h-1.5 w-1.5 rounded-full ${st.dot}"></span>${st.t} · ${v.confidence}</span>
            <div class="min-w-0">
              <p class="text-sm text-slate-800">${escapeHtml(v.claim)}</p>
              <p class="text-xs text-slate-400 mt-0.5">${escapeHtml(v.reasoning)}</p>
            </div></div></div>`;
      }).join("");
      return `<details class="mt-4 group"><summary class="cursor-pointer text-sm font-medium text-slate-600 hover:text-slate-900">
                Fact-check details (${verdicts.length})</summary>
              <div class="mt-2">${rows}</div></details>`;
    }

    function renderDraft(d) {
      renderSteps(null, true);
      const stats = `<div class="flex gap-4 text-xs text-slate-500 mt-1">
          <span><b class="text-slate-700">${d.n_verified}</b> verified</span>
          <span><b class="text-slate-700">${d.n_claims}</b> claims gathered</span></div>`;
      const el = card(`
        <div class="flex items-center justify-between">
          <span class="inline-flex items-center gap-2 rounded-full bg-amber-50 text-amber-700 border border-amber-200 px-3 py-1 text-xs font-medium">
            <span class="h-2 w-2 rounded-full bg-amber-500"></span>Draft — awaiting your approval</span>
        </div>
        ${stats}
        <div class="mt-4">${renderReport(d.report)}</div>
        ${renderVerdicts(d.verdicts)}
        <div class="mt-5 pt-4 border-t border-slate-100 flex gap-3">
          <button data-act="approve" class="flex-1 rounded-xl bg-emerald-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-emerald-700 transition">Approve &amp; export</button>
          <button data-act="reject" class="flex-1 rounded-xl bg-white border border-slate-300 px-4 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-50 transition">Reject &amp; revise</button>
        </div>`);
      el.querySelector('[data-act="approve"]').onclick = () => decide(el, true);
      el.querySelector('[data-act="reject"]').onclick = () => decide(el, false);
    }

    async function decide(draftEl, approved) {
      draftEl.querySelectorAll("button").forEach(b => { b.disabled = true; b.classList.add("opacity-50"); });
      try {
        const res = await fetch("/api/approve", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ thread_id: threadId, approved }),
        }).then(r => r.json());

        if (res.status === "exported") {
          card(`<div class="flex items-center gap-2 text-emerald-700 font-semibold">
                  <span class="h-2.5 w-2.5 rounded-full bg-emerald-500"></span>Approved — exported to <code class="bg-slate-100 px-1.5 py-0.5 rounded">./output</code></div>
                <div class="mt-4">${renderReport(res.report)}</div>`);
        } else if (res.status === "draft") {
          card(`<p class="text-sm text-slate-500">Revised draft generated — review again:</p>`);
          renderDraft(res);
        } else if (res.status === "error") {
          renderError(res.message);
        } else {
          card(`<p class="text-slate-600">Report was not approved; nothing was exported.</p>`);
        }
      } catch (e) {
        renderError(String(e));
      }
    }

    function renderRefused(reason) {
      renderSteps(null, false);
      card(`<div class="flex items-start gap-3">
        <span class="mt-0.5 h-2.5 w-2.5 rounded-full bg-rose-500 shrink-0"></span>
        <div><h3 class="font-semibold text-rose-700">Request refused by guardrails</h3>
        <p class="mt-1 text-sm text-slate-600">${escapeHtml(reason)}</p></div></div>`, "border-rose-200");
    }

    function renderError(msg) {
      card(`<h3 class="font-semibold text-rose-700">Something went wrong</h3>
            <p class="mt-1 text-sm text-slate-600 break-words">${escapeHtml(msg)}</p>`, "border-rose-200");
    }

    function startResearch() {
      const q = $("question").value.trim();
      if (!q) { $("question").focus(); return; }
      $("results").innerHTML = "";
      $("progress").classList.remove("hidden");
      renderSteps("guardrail");
      setBusy(true);
      threadId = null;
      if (es) es.close();

      es = new EventSource(`/api/research?question=${encodeURIComponent(q)}`);
      es.onmessage = (ev) => {
        const d = JSON.parse(ev.data);
        if (d.type === "thread") threadId = d.thread_id;
        else if (d.type === "node") renderSteps(d.node);
        else if (d.type === "draft") { renderDraft(d); es.close(); setBusy(false); }
        else if (d.type === "refused") { renderRefused(d.reason); es.close(); setBusy(false); }
        else if (d.type === "error") { renderError(d.message); es.close(); setBusy(false); }
        else if (d.type === "end") { es.close(); setBusy(false); }
      };
      es.onerror = () => { es.close(); setBusy(false); };
    }

    $("researchBtn").onclick = startResearch;
    $("question").addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") startResearch();
    });
  </script>
</body>
</html>
